<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FlashPal ✦ a whimsical memory garden</title>
<style>
  :root {
    --bg: #fff6ec;
    --bg2: #ffeede;
    --ink: #3b2f4a;
    --pink: #ff7eb6;
    --pink-d: #e85a98;
    --grape: #8a6fe0;
    --grape-d: #6f54c9;
    --mint: #57d9a3;
    --mint-d: #38b886;
    --sun: #ffcf5c;
    --sky: #6fc8ff;
    --card: #ffffff;
    --shadow: 0 10px 30px rgba(123, 92, 180, .18);
    --shadow-sm: 0 4px 14px rgba(123, 92, 180, .14);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: 'Quicksand', 'Trebuchet MS', system-ui, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(1200px 600px at 10% -5%, #fff 0%, transparent 60%),
      radial-gradient(900px 500px at 100% 0%, #ffe6f3 0%, transparent 55%),
      linear-gradient(160deg, var(--bg) 0%, var(--bg2) 100%);
    min-height: 100%;
    overflow-x: hidden;
  }
  /* floating doodles in the background */
  .sky { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .blob { position: absolute; font-size: 2rem; opacity: .5; animation: bob 9s ease-in-out infinite; filter: saturate(1.1); }
  @keyframes bob { 0%,100% { transform: translateY(0) rotate(-4deg); } 50% { transform: translateY(-22px) rotate(6deg); } }

  .wrap { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 28px 20px 80px; }

  header.app { display: flex; align-items: center; gap: 14px; margin-bottom: 6px; }
  .logo {
    font-size: 2.1rem; font-weight: 800; letter-spacing: -.5px;
    background: linear-gradient(90deg, var(--pink), var(--grape) 60%, var(--sky));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    display: flex; align-items: center; gap: 8px;
  }
  .logo .mark { font-size: 1.9rem; -webkit-text-fill-color: initial; }
  .tag { color: #9a8bb0; font-size: .92rem; margin: 0 0 22px 2px; }

  /* mascot */
  .pal { display: inline-block; transform-origin: bottom center; }
  .pal.bounce { animation: palBounce .6s ease; }
  @keyframes palBounce { 0%{transform:scale(1)} 30%{transform:scale(1.25) rotate(-8deg)} 60%{transform:scale(.92) rotate(6deg)} 100%{transform:scale(1)} }

  .row { display: flex; gap: 16px; flex-wrap: wrap; }
  .btn {
    border: none; cursor: pointer; font-family: inherit; font-weight: 700;
    border-radius: 16px; padding: 12px 20px; font-size: 1rem; color: #fff;
    box-shadow: var(--shadow-sm); transition: transform .12s ease, box-shadow .12s ease, filter .12s;
    background: var(--grape);
  }
  .btn:hover { transform: translateY(-2px) rotate(-1deg); filter: brightness(1.05); }
  .btn:active { transform: translateY(1px) scale(.98); }
  .btn.pink { background: linear-gradient(135deg, var(--pink), var(--pink-d)); }
  .btn.grape { background: linear-gradient(135deg, var(--grape), var(--grape-d)); }
  .btn.mint { background: linear-gradient(135deg, var(--mint), var(--mint-d)); }
  .btn.ghost { background: #fff; color: var(--grape-d); box-shadow: inset 0 0 0 2px #e9e0ff; }
  .btn.sm { padding: 8px 14px; font-size: .85rem; border-radius: 12px; }

  /* deck grid */
  .decks { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 18px; margin-top: 18px; }
  .deck {
    background: var(--card); border-radius: 22px; padding: 20px; box-shadow: var(--shadow);
    cursor: pointer; position: relative; overflow: hidden; transition: transform .15s ease;
    border: 2px solid transparent;
  }
  .deck:hover { transform: translateY(-4px) rotate(.4deg); border-color: #ffe1ef; }
  .deck .emoji { font-size: 2.4rem; display: block; margin-bottom: 8px; }
  .deck h3 { margin: 0 0 4px; font-size: 1.2rem; }
  .deck .meta { color: #a596bd; font-size: .85rem; }
  .deck .due-pill {
    position: absolute; top: 14px; right: 14px; background: var(--pink); color: #fff;
    font-size: .75rem; font-weight: 800; padding: 4px 10px; border-radius: 999px; box-shadow: var(--shadow-sm);
  }
  .deck .due-pill.zero { background: #d9eee2; color: var(--mint-d); }
  .deck .del { position: absolute; bottom: 12px; right: 14px; opacity: 0; background: none; border: none; cursor: pointer; font-size: 1rem; transition: opacity .15s; }
  .deck:hover .del { opacity: .5; }
  .deck .del:hover { opacity: 1; transform: scale(1.2); }

  .new-deck {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border: 3px dashed #e3d6ff; background: #fbf7ff; color: var(--grape-d);
    border-radius: 22px; cursor: pointer; min-height: 132px; font-weight: 700; gap: 6px; transition: all .15s;
  }
  .new-deck:hover { border-color: var(--grape); background: #f5efff; transform: translateY(-3px); }
  .new-deck .plus { font-size: 2rem; }

  .empty { text-align: center; color: #b3a5c8; padding: 40px 0; }

  /* study view */
  .study { display: none; }
  .study.active { display: block; }
  .study-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; gap: 10px; flex-wrap: wrap; }
  .progress { flex: 1; height: 14px; background: #efe6ff; border-radius: 999px; overflow: hidden; min-width: 120px; }
  .progress > div { height: 100%; width: 0; background: linear-gradient(90deg, var(--mint), var(--sun), var(--pink)); transition: width .4s cubic-bezier(.5,1.6,.4,1); border-radius: 999px; }
  .counts { font-weight: 700; color: #8a7aa6; font-size: .9rem; white-space: nowrap; }

  .scene { perspective: 1400px; margin: 10px auto 22px; max-width: 560px; }
  .flip { position: relative; width: 100%; min-height: 300px; transform-style: preserve-3d; transition: transform .6s cubic-bezier(.5,1.4,.4,1); cursor: pointer; }
  .flip.flipped { transform: rotateY(180deg); }
  .face {
    position: absolute; inset: 0; backface-visibility: hidden; border-radius: 26px; background: var(--card);
    box-shadow: var(--shadow); display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 34px; text-align: center; min-height: 300px;
  }
  .face .corner { position: absolute; top: 16px; left: 20px; font-size: .8rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: #cdbfe6; }
  .face .txt { font-size: 1.5rem; font-weight: 700; line-height: 1.35; }
  .face.front { border-top: 6px solid var(--grape); }
  .face.back { transform: rotateY(180deg); border-top: 6px solid var(--mint); background: linear-gradient(180deg, #fff, #f6fffb); }
  .hint { color: #b7a9cd; font-size: .85rem; margin-top: 18px; }

  .grades { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 560px; margin: 0 auto; }
  .grade { border: none; cursor: pointer; font-family: inherit; border-radius: 16px; padding: 14px 6px; color: #fff; font-weight: 800; box-shadow: var(--shadow-sm); transition: transform .12s; display: flex; flex-direction: column; gap: 2px; align-items: center; }
  .grade:hover { transform: translateY(-3px) scale(1.03); }
  .grade .lab { font-size: .95rem; }
  .grade .when { font-size: .72rem; font-weight: 600; opacity: .9; }
  .g-again { background: linear-gradient(135deg, #ff8a8a, #ff5d6c); }
  .g-hard { background: linear-gradient(135deg, #ffc06f, #ff9d4d); }
  .g-good { background: linear-gradient(135deg, #7ad0a0, #38b886); }
  .g-easy { background: linear-gradient(135deg, #8ec6ff, #6f8bff); }

  .done-card { text-align: center; background: var(--card); border-radius: 26px; padding: 44px; box-shadow: var(--shadow); }
  .done-card .big { font-size: 3.4rem; }
  .done-card h2 { margin: 8px 0; }
  .done-card p { color: #9a8bb0; }

  /* manage cards */
  .manage { margin-top: 26px; }
  .manage h3 { display: flex; align-items: center; gap: 8px; }
  .card-list { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
  .crow { background: #fff; border-radius: 14px; padding: 12px 16px; box-shadow: var(--shadow-sm); display: flex; gap: 12px; align-items: center; }
  .crow .q { font-weight: 700; flex: 1; }
  .crow .a { color: #9a8bb0; flex: 1; }
  .crow .badge { font-size: .7rem; font-weight: 800; padding: 3px 8px; border-radius: 999px; background: #efe6ff; color: var(--grape-d); }
  .crow .x { background: none; border: none; cursor: pointer; opacity: .4; font-size: 1rem; }
  .crow .x:hover { opacity: 1; }

  /* modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(59,47,74,.4); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 50; padding: 20px; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--card); border-radius: 24px; padding: 28px; width: 100%; max-width: 440px; box-shadow: var(--shadow); animation: pop .3s cubic-bezier(.5,1.6,.4,1); }
  @keyframes pop { from { transform: scale(.85) translateY(10px); opacity: 0; } to { transform: none; opacity: 1; } }
  .modal h2 { margin: 0 0 16px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-weight: 700; font-size: .85rem; margin-bottom: 6px; color: #7a6a96; }
  .field input, .field textarea {
    width: 100%; border: 2px solid #ece3ff; border-radius: 14px; padding: 12px 14px; font-family: inherit; font-size: 1rem; color: var(--ink); background: #fbf9ff; resize: vertical;
  }
  .field input:focus, .field textarea:focus { outline: none; border-color: var(--grape); background: #fff; }
  .emoji-pick { display: flex; gap: 6px; flex-wrap: wrap; }
  .emoji-pick button { font-size: 1.4rem; background: #f6f1ff; border: 2px solid transparent; border-radius: 12px; cursor: pointer; padding: 6px 8px; }
  .emoji-pick button.sel { border-color: var(--grape); background: #fff; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }

  /* confetti */
  .confetti { position: fixed; top: -10px; font-size: 1.2rem; pointer-events: none; z-index: 100; animation: fall linear forwards; }
  @keyframes fall { to { transform: translateY(105vh) rotate(720deg); opacity: .9; } }

  .hidden { display: none !important; }
  .streak { display: inline-flex; align-items: center; gap: 5px; background: #fff; padding: 6px 12px; border-radius: 999px; box-shadow: var(--shadow-sm); font-weight: 800; color: var(--pink-d); margin-left: auto; }
</style>
</head>
<body>
<div class="sky" id="sky"></div>
<div class="wrap">
  <header class="app">
    <div class="logo"><span class="mark pal" id="pal">🦊</span> FlashPal</div>
    <div class="streak" id="streak" title="cards reviewed today">⚡ <span id="streakN">0</span></div>
  </header>
  <p class="tag">A whimsical little memory garden — plant a card, water it daily, watch it bloom. 🌱</p>

  <!-- HOME -->
  <section id="home">
    <div class="row" style="margin-bottom: 4px;">
      <button class="btn pink" id="studyAllBtn">✦ Study everything due</button>
    </div>
    <div class="decks" id="decks"></div>
  </section>

  <!-- STUDY -->
  <section class="study" id="study">
    <div class="study-top">
      <button class="btn ghost sm" id="backBtn">← back</button>
      <div class="progress"><div id="progBar"></div></div>
      <span class="counts" id="counts"></span>
    </div>
    <div id="studyBody"></div>
  </section>

  <!-- MANAGE (under home, per-deck) -->
</div>

<!-- DECK MODAL -->
<div class="modal-bg" id="deckModal">
  <div class="modal">
    <h2>✨ New deck</h2>
    <div class="field">
      <label>Pick a mascot</label>
      <div class="emoji-pick" id="emojiPick"></div>
    </div>
    <div class="field">
      <label>Deck name</label>
      <input id="deckName" placeholder="e.g. Spanish verbs, Capitals, Guitar chords" maxlength="40" />
    </div>
    <div class="modal-actions">
      <button class="btn ghost" data-close>Cancel</button>
      <button class="btn grape" id="createDeck">Plant it 🌱</button>
    </div>
  </div>
</div>

<!-- CARD MODAL -->
<div class="modal-bg" id="cardModal">
  <div class="modal">
    <h2>🃏 New card</h2>
    <div class="field">
      <label>Front (question)</label>
      <textarea id="cardFront" rows="2" placeholder="What's on the front?"></textarea>
    </div>
    <div class="field">
      <label>Back (answer)</label>
      <textarea id="cardBack" rows="2" placeholder="...and the answer?"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn ghost" data-close>Done</button>
      <button class="btn mint" id="addCard">Add & keep going ↵</button>
    </div>
  </div>
</div>

<script>
//// ---------- storage ----------
const KEY = 'flashpal.v1';
const load = () => { try { return JSON.parse(localStorage.getItem(KEY)) || null; } catch { return null; } };
const save = () => localStorage.setItem(KEY, JSON.stringify(state));

const todayStr = () => new Date().toISOString().slice(0,10);
const now = () => Date.now();
const DAY = 86400000;

let state = load() || seed();

function seed() {
  const mk = (front, back) => ({ id: rid(), front, back, ease: 2.5, interval: 0, reps: 0, due: now() });
  return {
    decks: [
      { id: rid(), emoji: '🌍', name: 'World Capitals', cards: [
        mk('Capital of Japan?', 'Tokyo 🗼'),
        mk('Capital of Australia?', 'Canberra (not Sydney!) 🦘'),
        mk('Capital of Canada?', 'Ottawa 🍁'),
      ]},
      { id: rid(), emoji: '🦊', name: 'Fun Facts', cards: [
        mk('A group of foxes is called a...?', 'A skulk (or a leash) 🦊'),
        mk('How many hearts does an octopus have?', 'Three 🐙'),
      ]},
    ],
    streak: { date: todayStr(), count: 0 },
  };
}
function rid() { return Math.random().toString(36).slice(2, 10); }
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

//// ---------- SM-2-ish scheduler ----------
// grade: 0=again 1=hard 2=good 3=easy
function schedule(card, grade) {
  let { ease, interval, reps } = card;
  if (grade === 0) { reps = 0; interval = 0; ease = Math.max(1.3, ease - 0.2); }
  else {
    ease = Math.max(1.3, ease + (grade === 1 ? -0.15 : grade === 3 ? 0.15 : 0));
    reps += 1;
    if (reps === 1) interval = grade === 1 ? 0 : 1;
    else if (reps === 2) interval = grade === 1 ? 1 : 3;
    else interval = Math.round(interval * ease * (grade === 1 ? 0.6 : grade === 3 ? 1.3 : 1));
    interval = Math.max(grade === 0 ? 0 : 1, interval);
  }
  card.ease = ease; card.interval = interval; card.reps = reps;
  // "again" / interval 0 => come back in ~1 min within this session feel; store +10min
  card.due = now() + (interval === 0 ? 10 * 60 * 1000 : interval * DAY);
  return card;
}
function intervalLabel(card, grade) {
  const tmp = { ...card };
  schedule(tmp, grade);
  if (tmp.interval === 0) return '<10m';
  if (tmp.interval === 1) return '1d';
  if (tmp.interval < 30) return tmp.interval + 'd';
  if (tmp.interval < 365) return Math.round(tmp.interval/30) + 'mo';
  return (tmp.interval/365).toFixed(1) + 'y';
}
const dueCards = (deck) => deck.cards.filter(c => c.due <= now());
const allDue = () => state.decks.flatMap(d => d.cards.map(c => ({c, d}))).filter(x => x.c.due <= now());

//// ---------- streak ----------
function bumpStreak() {
  if (state.streak.date !== todayStr()) state.streak = { date: todayStr(), count: 0 };
  state.streak.count++;
  save(); renderStreak();
}
function renderStreak() {
  if (state.streak.date !== todayStr()) state.streak = { date: todayStr(), count: 0 };
  document.getElementById('streakN').textContent = state.streak.count;
}

//// ---------- HOME render ----------
const $ = s => document.querySelector(s);
const decksEl = $('#decks');

function renderHome() {
  $('#home').classList.remove('hidden');
  $('#study').classList.remove('active');
  decksEl.innerHTML = '';
  state.decks.forEach(deck => {
    const due = dueCards(deck).length;
    const el = document.createElement('div');
    el.className = 'deck';
    el.innerHTML = `
      <span class="due-pill ${due ? '' : 'zero'}">${due ? due + ' due' : 'all done ✓'}</span>
      <span class="emoji">${deck.emoji}</span>
      <h3>${escapeHtml(deck.name)}</h3>
      <div class="meta">${deck.cards.length} card${deck.cards.length===1?'':'s'}</div>
      <button class="del" title="delete deck">🗑️</button>`;
    el.onclick = (e) => { if (e.target.classList.contains('del')) return; openDeck(deck.id); };
    el.querySelector('.del').onclick = (e) => { e.stopPropagation(); delDeck(deck.id); };
    decksEl.appendChild(el);
  });
  const add = document.createElement('div');
  add.className = 'new-deck';
  add.innerHTML = `<span class="plus">＋</span> New deck`;
  add.onclick = openDeckModal;
  decksEl.appendChild(add);
  renderStreak();
}

function delDeck(id) {
  const d = state.decks.find(x => x.id === id);
  if (!confirm(`Delete "${d.name}" and its ${d.cards.length} cards?`)) return;
  state.decks = state.decks.filter(x => x.id !== id);
  save(); renderHome();
}

//// ---------- DECK view (manage + study button) ----------
let currentDeck = null; // null = study all
function openDeck(id) {
  currentDeck = state.decks.find(d => d.id === id);
  $('#home').classList.add('hidden');
  const study = $('#study'); study.classList.add('active');
  renderDeckHome();
}

function renderDeckHome() {
  const d = currentDeck;
  const due = dueCards(d).length;
  $('#progBar').style.width = '0%';
  $('#counts').textContent = '';
  $('#studyBody').innerHTML = `
    <div class="done-card">
      <div class="big">${d.emoji}</div>
      <h2>${escapeHtml(d.name)}</h2>
      <p>${d.cards.length} cards · <b>${due}</b> due right now</p>
      <div class="row" style="justify-content:center; margin-top:18px;">
        ${due ? `<button class="btn pink" id="goStudy">Study ${due} card${due===1?'':'s'} ✦</button>` : `<button class="btn ghost" id="goStudy">Review anyway</button>`}
        <button class="btn mint" id="goAdd">＋ Add card</button>
      </div>
    </div>
    <div class="manage">
      <h3>📚 Cards</h3>
      <div class="card-list" id="cardList"></div>
    </div>`;
  $('#goStudy').onclick = () => startSession(due ? dueCards(d) : d.cards.slice());
  $('#goAdd').onclick = () => openCardModal();
  const list = $('#cardList');
  if (!d.cards.length) list.innerHTML = `<div class="empty">No cards yet — add your first one! 🃏</div>`;
  d.cards.forEach(c => {
    const overdue = c.due <= now();
    const row = document.createElement('div');
    row.className = 'crow';
    row.innerHTML = `<span class="q">${escapeHtml(c.front)}</span>
      <span class="a">${escapeHtml(c.back)}</span>
      <span class="badge">${overdue ? 'due' : 'rep '+c.reps}</span>
      <button class="x" title="delete">✕</button>`;
    row.querySelector('.x').onclick = () => { d.cards = d.cards.filter(x => x.id !== c.id); save(); renderDeckHome(); };
    list.appendChild(row);
  });
}

//// ---------- STUDY session ----------
let session = null;
function startSession(cards) {
  if (!cards.length) { palCheer(); return; }
  // shuffle
  cards = cards.slice().sort(() => Math.random() - .5);
  session = { queue: cards, total: cards.length, done: 0, flipped: false };
  $('#home').classList.add('hidden');
  $('#study').classList.add('active');
  renderCard();
}

function startStudyAll() {
  const due = allDue();
  if (!due.length) { palCheer(); flash('Nothing due — go play! 🎉'); return; }
  currentDeck = null;
  startSession(due.map(x => x.c));
}

function renderCard() {
  const s = session;
  const pct = Math.round((s.done / s.total) * 100);
  $('#progBar').style.width = pct + '%';
  $('#counts').textContent = `${s.done}/${s.total}`;
  if (!s.queue.length) return finishSession();
  const card = s.queue[0];
  s.flipped = false;
  $('#studyBody').innerHTML = `
    <div class="scene">
      <div class="flip" id="flip">
        <div class="face front">
          <span class="corner">front</span>
          <div class="txt">${escapeHtml(card.front)}</div>
          <div class="hint">tap card or press <b>space</b> to flip</div>
        </div>
        <div class="face back">
          <span class="corner">back</span>
          <div class="txt">${escapeHtml(card.back)}</div>
          <div class="hint">how well did you know it?</div>
        </div>
      </div>
    </div>
    <div class="grades hidden" id="grades">
      <button class="grade g-again" data-g="0"><span class="lab">Again</span><span class="when">${intervalLabel(card,0)}</span></button>
      <button class="grade g-hard"  data-g="1"><span class="lab">Hard</span><span class="when">${intervalLabel(card,1)}</span></button>
      <button class="grade g-good"  data-g="2"><span class="lab">Good</span><span class="when">${intervalLabel(card,2)}</span></button>
      <button class="grade g-easy"  data-g="3"><span class="lab">Easy</span><span class="when">${intervalLabel(card,3)}</span></button>
    </div>`;
  const flip = $('#flip');
  flip.onclick = doFlip;
  $('#grades').querySelectorAll('.grade').forEach(b => b.onclick = () => gradeCard(+b.dataset.g));
}

function doFlip() {
  if (session.flipped) return;
  session.flipped = true;
  $('#flip').classList.add('flipped');
  setTimeout(() => $('#grades').classList.remove('hidden'), 280);
}

function gradeCard(grade) {
  const s = session;
  const card = s.queue.shift();
  schedule(card, grade);
  bumpStreak();
  // requeue "again" cards at the end of this session too
  if (grade === 0) s.queue.push(card);
  else s.done++;
  save();
  // confetti on easy
  if (grade === 3) burst(8);
  palBounce();
  renderCard();
}

function finishSession() {
  burst(40);
  palCheer();
  const back = currentDeck ? `back to ${escapeHtml(currentDeck.name)}` : 'back to decks';
  $('#progBar').style.width = '100%';
  $('#studyBody').innerHTML = `
    <div class="done-card">
      <div class="big">🎉</div>
      <h2>Garden watered!</h2>
      <p>You reviewed <b>${session.total}</b> card${session.total===1?'':'s'}. Come back tomorrow to keep them blooming. 🌸</p>
      <div class="row" style="justify-content:center; margin-top:18px;">
        <button class="btn grape" id="finBack">${currentDeck ? '← '+back : '← '+back}</button>
      </div>
    </div>`;
  $('#finBack').onclick = () => currentDeck ? renderDeckHome() : goHome();
  session = null;
}

//// ---------- mascot + fx ----------
const pal = $('#pal');
const palFaces = ['🦊','🐱','🐰','🦉','🐢','🐥','🦔'];
function palBounce() { pal.classList.remove('bounce'); void pal.offsetWidth; pal.classList.add('bounce'); }
function palCheer() { pal.textContent = '🥳'; palBounce(); setTimeout(() => pal.textContent = '🦊', 1400); }

function burst(n) {
  const emo = ['✨','🎊','🌟','💜','🌸','⭐','🎉','💫'];
  for (let i = 0; i < n; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.textContent = emo[Math.floor(Math.random()*emo.length)];
    c.style.left = Math.random()*100 + 'vw';
    c.style.animationDuration = (1.6 + Math.random()*1.4) + 's';
    c.style.fontSize = (0.9 + Math.random()*1.3) + 'rem';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 3200);
  }
}

let flashT;
function flash(msg) {
  let f = $('#flashMsg');
  if (!f) { f = document.createElement('div'); f.id = 'flashMsg';
    f.style.cssText = 'position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:#fff;padding:12px 22px;border-radius:999px;box-shadow:var(--shadow);font-weight:700;z-index:120;transition:opacity .3s';
    document.body.appendChild(f);
  }
  f.textContent = msg; f.style.opacity = '1';
  clearTimeout(flashT); flashT = setTimeout(() => f.style.opacity = '0', 1800);
}

//// ---------- modals ----------
const deckEmojis = ['🌍','🦊','📚','🎸','🧪','🇪🇸','🧠','🍜','🎨','💻','🩺','♟️'];
let pickedEmoji = deckEmojis[0];
function openDeckModal() {
  pickedEmoji = deckEmojis[0];
  const pick = $('#emojiPick');
  pick.innerHTML = '';
  deckEmojis.forEach((e,i) => {
    const b = document.createElement('button');
    b.textContent = e; if (i===0) b.classList.add('sel');
    b.onclick = () => { pickedEmoji = e; pick.querySelectorAll('button').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); };
    pick.appendChild(b);
  });
  $('#deckName').value = '';
  $('#deckModal').classList.add('open');
  setTimeout(() => $('#deckName').focus(), 50);
}
$('#createDeck').onclick = () => {
  const name = $('#deckName').value.trim();
  if (!name) { $('#deckName').focus(); return; }
  state.decks.push({ id: rid(), emoji: pickedEmoji, name, cards: [] });
  save(); $('#deckModal').classList.remove('open');
  burst(12); renderHome();
};

function openCardModal() {
  $('#cardFront').value = ''; $('#cardBack').value = '';
  $('#cardModal').classList.add('open');
  setTimeout(() => $('#cardFront').focus(), 50);
}
$('#addCard').onclick = addCardFn;
function addCardFn() {
  const front = $('#cardFront').value.trim();
  const back = $('#cardBack').value.trim();
  if (!front || !back) { flash('Both sides please! 🃏'); return; }
  currentDeck.cards.push({ id: rid(), front, back, ease: 2.5, interval: 0, reps: 0, due: now() });
  save();
  $('#cardFront').value = ''; $('#cardBack').value = '';
  $('#cardFront').focus();
  burst(5); flash('Card planted 🌱');
}

document.querySelectorAll('[data-close]').forEach(b => b.onclick = () => {
  document.querySelectorAll('.modal-bg').forEach(m => m.classList.remove('open'));
  if (currentDeck) renderDeckHome();
});
document.querySelectorAll('.modal-bg').forEach(m => m.onclick = e => { if (e.target === m) { m.classList.remove('open'); if (currentDeck) renderDeckHome(); } });

//// ---------- nav ----------
function goHome() { currentDeck = null; session = null; $('#study').classList.remove('active'); renderHome(); }
$('#backBtn').onclick = goHome;
$('#studyAllBtn').onclick = startStudyAll;

//// ---------- keyboard ----------
document.addEventListener('keydown', e => {
  if (document.querySelector('.modal-bg.open')) {
    if (e.key === 'Enter' && $('#cardModal').classList.contains('open') && (e.target.id==='cardBack')) { e.preventDefault(); addCardFn(); }
    if (e.key === 'Enter' && $('#deckModal').classList.contains('open')) { e.preventDefault(); $('#createDeck').click(); }
    if (e.key === 'Escape') document.querySelectorAll('.modal-bg').forEach(m=>m.classList.remove('open'));
    return;
  }
  if (!session) return;
  if (e.code === 'Space') { e.preventDefault(); session.flipped ? null : doFlip(); }
  if (session.flipped && ['1','2','3','4'].includes(e.key)) gradeCard(+e.key - 1);
});

//// ---------- background doodles ----------
(function(){
  const sky = $('#sky');
  const doodles = ['☁️','✦','🌸','⭐','🍃','💜','✿','☁️','✦'];
  for (let i=0;i<14;i++){
    const d = document.createElement('div');
    d.className='blob'; d.textContent = doodles[i%doodles.length];
    d.style.left = Math.random()*100+'vw';
    d.style.top = Math.random()*100+'vh';
    d.style.animationDelay = (Math.random()*9)+'s';
    d.style.fontSize = (1+Math.random()*1.8)+'rem';
    sky.appendChild(d);
  }
})();

//// ---------- go ----------
renderHome();
</script>
</body>
</html>
